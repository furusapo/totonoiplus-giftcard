<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギフトカード発行システム</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN",sans-serif}
body{background:#f4f7f5;color:#243126;padding:16px}
.container{max-width:920px;margin:0 auto}
header{background:linear-gradient(135deg,#2e7d32,#66bb6a);color:#fff;padding:18px;border-radius:18px;margin-bottom:16px}
h1{font-size:22px}
.sub{font-size:13px;opacity:.9;margin-top:4px}
.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:16px}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;color:#2e7d32}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
label{display:block;font-size:12px;font-weight:700;color:#5f6f62;margin-bottom:6px}
input,select{width:100%;padding:13px;border:1px solid #d9e3db;border-radius:12px;font-size:16px;background:#fff}
.customer-preview{margin-top:8px;background:#f1f3f1;border-radius:12px;padding:10px;font-size:13px;color:#667}
.design-row{display:grid;grid-template-columns:1fr 1fr 48px;gap:10px;align-items:end;margin-bottom:10px}
.remove-row-btn{height:48px;border-radius:12px;border:1px solid #f0c8c8;background:#fff;color:#c62828;font-size:22px;font-weight:700}
.remove-row-btn:disabled{visibility:hidden}
button{width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;cursor:pointer}
.add-row-btn{background:#fff;color:#2e7d32;border:2px dashed #aed8b0;margin-top:6px}
.generate-btn{background:#2e7d32;color:#fff;margin-top:16px;font-size:18px}
.checkbox-label{display:flex;align-items:center;gap:10px;border:1px solid #d9e3db;border-radius:12px;padding:13px;background:#fafafa;font-size:15px}
.checkbox-label input{width:20px;height:20px;accent-color:#2e7d32}
.price-summary{background:#fff8e1;border:1px solid #ffe082;border-radius:14px;padding:14px;margin-top:14px}
.price-summary .row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px}
.price-summary .total{border-top:1px solid #ffe082;margin-top:6px;padding-top:8px;font-size:20px;font-weight:700}
.result{margin-top:16px}
.serial-card{background:#eef7ee;border-left:6px solid #2e7d32;border-radius:14px;padding:14px;margin-bottom:10px}
.serial{font-size:22px;font-weight:700;color:#1b5e20}
.info{font-size:13px;color:#58645a;line-height:1.7;margin-top:6px}
@media(max-width:700px){
  body{padding:10px}
  header{padding:15px}
  h1{font-size:20px}
  .design-row{grid-template-columns:1fr 1fr 44px}
}

/* ===== TOTONOI+ 店舗寄せデザイン ===== */
:root{
  --gold:#b8975a;
  --gold-light:#d4b47a;
  --black:#0d0d0d;
  --dark:#1a1410;
  --green:#3a5a3c;
  --cream:#f8f4ee;
}

body{
  background:
    radial-gradient(circle at top right, rgba(184,151,90,.18), transparent 36%),
    linear-gradient(135deg, #0d0d0d 0%, #1a1410 45%, #0d0d0d 100%) !important;
  color:#f8f4ee !important;
}

.container{
  max-width:960px !important;
}

header{
  background:rgba(13,13,13,.88) !important;
  border:1px solid rgba(184,151,90,.45);
  box-shadow:0 10px 32px rgba(0,0,0,.35);
}

h1{
  color:var(--gold-light) !important;
  letter-spacing:.08em;
  font-family:"Noto Serif JP","Zen Maru Gothic",serif !important;
}

.card{
  background:rgba(248,244,238,.96) !important;
  border:1px solid rgba(184,151,90,.28);
  box-shadow:0 12px 32px rgba(0,0,0,.28) !important;
}

.section-title,
label{
  color:#8a6e3a !important;
}

input,select{
  background:#fffdf8 !important;
  border:1px solid rgba(184,151,90,.35) !important;
}

button,
.generate-btn{
  background:linear-gradient(135deg,#b8975a,#8a6e3a) !important;
  color:#0d0d0d !important;
  letter-spacing:.05em;
}

.add-row-btn{
  background:#fffdf8 !important;
  color:#3a5a3c !important;
  border:2px dashed rgba(184,151,90,.55) !important;
}

.serial-card{
  background:#f8f4ee !important;
  border-left:6px solid #b8975a !important;
}

.serial{
  color:#8a6e3a !important;
}

.info,.customer-preview{
  color:#4a4a4a !important;
}

.price-summary{
  background:#1a1410 !important;
  border:1px solid rgba(184,151,90,.55) !important;
  color:#f8f4ee !important;
}

.price-summary .total{
  color:#d4b47a !important;
  border-top:1px solid rgba(184,151,90,.5) !important;
}


/* ===== 発行ダッシュボード ===== */
.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:16px;
}
.dash-card{
  background:rgba(13,13,13,.88);
  border:1px solid rgba(184,151,90,.45);
  border-radius:16px;
  padding:14px;
  box-shadow:0 10px 24px rgba(0,0,0,.24);
}
.dash-label{
  font-size:11px;
  color:rgba(248,244,238,.68);
  letter-spacing:.08em;
}
.dash-num{
  font-size:26px;
  font-weight:700;
  color:#d4b47a;
  margin-top:4px;
}
.dash-note{
  font-size:11px;
  color:rgba(248,244,238,.55);
  margin-top:4px;
}
.dash-warning .dash-num{
  color:#ffcc80;
}
@media(max-width:700px){
  .dashboard{
    grid-template-columns:1fr 1fr;
  }
}

</style>
</head>

<body>
<div class="container">

<header>
  <h1>TOTONOI+ GIFT CARD 発行</h1>
  <div class="sub">発行済みシリアルをデザイン別に自動表示します</div>
</header>

<div class="dashboard">
  <div class="dash-card">
    <div class="dash-label">発行予定</div>
    <div class="dash-num" id="dashIssueCount">0枚</div>
    <div class="dash-note">今回発行する枚数</div>
  </div>
  <div class="dash-card" id="dashDesign1">
    <div class="dash-label">Design 01 残数目安</div>
    <div class="dash-num" id="dashStock1">50枚</div>
    <div class="dash-note">TG-0001〜0050</div>
  </div>
  <div class="dash-card" id="dashDesign2">
    <div class="dash-label">Design 02 残数目安</div>
    <div class="dash-num" id="dashStock2">50枚</div>
    <div class="dash-note">TG-0051〜0100</div>
  </div>
  <div class="dash-card" id="dashDesign3">
    <div class="dash-label">Design 03 残数目安</div>
    <div class="dash-num" id="dashStock3">50枚</div>
    <div class="dash-note">TG-0101〜0150</div>
  </div>
</div>


<div class="card">
  <div class="section-title">基本情報</div>

  <div class="grid">
    <div>
      <label>電話番号</label>
      <input type="tel" id="phone" placeholder="09012345678">
      <div class="customer-preview">顧客情報：今後、顧客データと紐付け予定</div>
    </div>

    <div>
      <label>発行担当者</label>
      <select id="staff">
        <option value="">選択してください</option>
        <option>土屋</option>
        <option>四ツ谷</option>
        <option>絹果</option>
        <option>ユミ・専務</option>
        <option>高橋</option>
        <option>佐藤</option>
        <option>望</option>
        <option>東江</option>
        <option>渡邊</option>
        <option>柳瀬</option>
        <option>琴音</option>
        <option>高田</option>
        <option>細川</option>
      </select>
    </div>

    <div>
      <label>封筒</label>
      <label class="checkbox-label">
        <input type="checkbox" id="envelopeCheck">
        封筒を追加
      </label>
      <div id="envelopeCountWrap" style="display:none;margin-top:8px;">
        <label>封筒枚数（1枚目無料／2枚目以降380円）</label>
        <input type="number" id="envelopeCount" min="1" value="1">
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="section-title">デザイン・枚数</div>
  <div id="designRows"></div>
  <button type="button" id="addRowBtn" class="add-row-btn">＋ デザインを追加</button>

  <div class="price-summary" id="priceSummary">
    <div class="row"><span>ギフトカード</span><span id="cardTotal">0円</span></div>
    <div class="row"><span>発行手数料</span><span id="issueFee">0円</span></div>
    <div class="row"><span>封筒追加料金</span><span id="envelopeFee">0円</span></div>
    <div class="row total"><span>合計</span><span id="grandTotal">0円</span></div>
  </div>

  <button id="generateBtn" class="generate-btn">ギフトカード発行</button>

  <div id="result" class="result"></div>
</div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxrRcaJSBI8QN1KWBogbD0MK222FtVBDvlmSnRN2nsEaSwrOyv7xqxtosK_Yk6nHnx8/exec';
const CARD_PRICE = 5000;
const ISSUE_FEE = 500;
const ENVELOPE_FEE = 380;

const serialStart = {
  1: 1,
  2: 51,
  3: 101
};

const designRows = document.getElementById('designRows');
const addRowBtn = document.getElementById('addRowBtn');
const envelopeCheck = document.getElementById('envelopeCheck');
const envelopeCountWrap = document.getElementById('envelopeCountWrap');
const envelopeCount = document.getElementById('envelopeCount');

let rowId = 0;

function yen(n){
  return Number(n).toLocaleString('ja-JP') + '円';
}

function countOptions(selected=1){
  let html = '';
  const cards = [];
  for(let i=1; i<=10; i++){
    html += `<option value="${i}" ${i===selected?'selected':''}>${i}枚</option>`;
  }
  return html;
}

function addDesignRow(design=1,count=1){
  rowId++;
  const row = document.createElement('div');
  row.className = 'design-row';
  row.innerHTML = `
    <div>
      <label>デザイン</label>
      <select class="design-select">
        <option value="1" ${design===1?'selected':''}>デザイン1（TG-0001〜0050）</option>
        <option value="2" ${design===2?'selected':''}>デザイン2（TG-0051〜0100）</option>
        <option value="3" ${design===3?'selected':''}>デザイン3（TG-0101〜0150）</option>
      </select>
    </div>
    <div>
      <label>枚数</label>
      <select class="count-select">${countOptions(count)}</select>
    </div>
    <button type="button" class="remove-row-btn">×</button>
  `;

  row.querySelector('.remove-row-btn').addEventListener('click',()=>{
    row.remove();
    updateRemoveButtons();
    updatePrice();
  });

  row.querySelector('.design-select').addEventListener('change', updatePrice);
  row.querySelector('.count-select').addEventListener('change', updatePrice);

  designRows.appendChild(row);
  updateRemoveButtons();
  updatePrice();
}

function updateRemoveButtons(){
  const rows = designRows.querySelectorAll('.design-row');
  rows.forEach(row=>{
    row.querySelector('.remove-row-btn').disabled = rows.length <= 1;
  });
}

function getEntries(){
  return Array.from(designRows.querySelectorAll('.design-row')).map(row=>({
    design:Number(row.querySelector('.design-select').value),
    count:Number(row.querySelector('.count-select').value)
  }));
}

function calcEnvelopeFee(){
  if(!envelopeCheck.checked) return 0;
  const count = Math.max(1, Number(envelopeCount.value) || 1);
  return Math.max(0, count - 1) * ENVELOPE_FEE;
}

function updatePrice(){
  const entries = getEntries();
  const totalCards = entries.reduce((sum,e)=>sum + e.count,0);
  const cardTotal = totalCards * CARD_PRICE;
  const issueFee = totalCards > 0 ? ISSUE_FEE : 0;
  const envelopeFee = calcEnvelopeFee();
  const grandTotal = cardTotal + issueFee + envelopeFee;

  document.getElementById('cardTotal').textContent = yen(cardTotal);
  document.getElementById('issueFee').textContent = yen(issueFee);
  document.getElementById('envelopeFee').textContent = yen(envelopeFee);
  document.getElementById('grandTotal').textContent = yen(grandTotal);
}

envelopeCheck.addEventListener('change',()=>{
  envelopeCountWrap.style.display = envelopeCheck.checked ? 'block' : 'none';
  updatePrice();
});
envelopeCount.addEventListener('input', updatePrice);
addRowBtn.addEventListener('click',()=>addDesignRow());

addDesignRow();


document.getElementById('generateBtn').addEventListener('click',()=>{
  const staff = document.getElementById('staff').value;
  const phone = document.getElementById('phone').value || '未入力';

  if(!staff){
    alert('発行担当者を選択してください');
    return;
  }

  const today = new Date();
  const issueDate = today.toLocaleDateString('ja-JP');
  const expire = new Date(today);
  expire.setFullYear(expire.getFullYear() + 1);
  const expireDate = expire.toLocaleDateString('ja-JP');

  const entries = getEntries();

  const callbackName = 'giftCallback_' + Date.now();

  window[callbackName] = function(res){
    if(!res || res.result !== 'success'){
      alert('保存に失敗しました');
      return;
    }

    let resultHtml = '';

    res.cards.forEach(card=>{
      resultHtml += `
        <div class="serial-card">
          <div class="serial">${card.serial}</div>
          <div class="info">
            ${card.design}<br>
            発行日：${card.issueDate}<br>
            有効期限：${card.expireDate}<br>
            電話番号：${card.phone}<br>
            発行担当者：${card.staff}<br>
            状態：未使用
          </div>
        </div>
      `;
    });

    document.getElementById('result').innerHTML = resultHtml;
    alert('スプレッドシートへ保存しました');

    delete window[callbackName];
    script.remove();
  };

  const payload = {
    phone,
    staff,
    issueDate,
    expireDate,
    requests: entries
  };

  const script = document.createElement('script');
  script.src = 'https://script.google.com/macros/s/AKfycbxrRcaJSBI8QN1KWBogbD0MK222FtVBDvlmSnRN2nsEaSwrOyv7xqxtosK_Yk6nHnx8/exec?callback=' + callbackName + '&data=' + encodeURIComponent(JSON.stringify(payload));
  document.body.appendChild(script);
});

</script>


<script>
function updateDashboard(){
  const rows = document.querySelectorAll('.design-row');
  const used = {1:0,2:0,3:0};

  rows.forEach(row=>{
    const design = Number(row.querySelector('.design-select')?.value || 1);
    const count = Number(row.querySelector('.count-select')?.value || 0);
    used[design] += count;
  });

  const total = used[1] + used[2] + used[3];

  const setText = (id, value) => {
    const el = document.getElementById(id);
    if(el) el.textContent = value;
  };

  setText('dashIssueCount', total + '枚');
  setText('dashStock1', (50 - used[1]) + '枚');
  setText('dashStock2', (50 - used[2]) + '枚');
  setText('dashStock3', (50 - used[3]) + '枚');

  [1,2,3].forEach(n=>{
    const card = document.getElementById('dashDesign' + n);
    if(!card) return;
    card.classList.toggle('dash-warning', (50 - used[n]) <= 10);
  });
}

document.addEventListener('change', updateDashboard);
document.addEventListener('click', () => setTimeout(updateDashboard, 50));
window.addEventListener('load', updateDashboard);
</script>

</body>
</html>
