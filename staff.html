<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TOTONOI+ ギフトカード管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#f5f1ea;margin:0;padding:20px;color:#2b2b2b}
.wrap{max-width:560px;margin:auto;background:#fff;border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{font-size:22px;margin:0 0 18px}
label{font-weight:700;display:block;margin-top:16px}
input,select,textarea,button{width:100%;box-sizing:border-box;font-size:16px;padding:13px;border-radius:12px;border:1px solid #ccc;margin-top:8px}
button{border:0;background:#222;color:#fff;font-weight:700;cursor:pointer}
.use{background:#8a5a44;margin-top:20px}
.card{margin-top:22px;padding:18px;border-radius:16px;background:#faf7f2;border:1px solid #e3d8cb}
.status{font-size:22px;font-weight:800;margin-bottom:10px}
.unused{color:#008a45}
.used{color:#b00020}
.row{margin-top:9px}
.note{font-size:13px;color:#777;margin-top:18px;line-height:1.6}
.error{color:#b00020;font-weight:700;margin-top:18px}
.correctionPanel{
  margin-top:24px;
  padding:18px;
  border:2px solid #d58a28;
  border-radius:16px;
  background:#fffaf1;
}
.correctionPanel h2{
  margin:0 0 10px;
  color:#9a5a0a;
  font-size:18px;
}
.correctionPanel p{
  color:#74542d;
  font-size:13px;
  line-height:1.7;
}
.correctionButton{
  background:#c97818;
  margin-top:18px;
}
.correctionButton:disabled{
  opacity:.45;
  cursor:not-allowed;
}
.checkRow{
  display:grid;
  grid-template-columns:24px 1fr;
  gap:10px;
  align-items:flex-start;
  margin-top:14px;
  line-height:1.6;
  font-size:14px;
}
.checkRow input{
  width:20px;
  height:20px;
  margin:2px 0 0;
  padding:0;
}
.countHint{
  text-align:right;
  font-size:12px;
  color:#8b6d48;
  margin-top:5px;
}
.auditNotice{
  margin-top:14px;
  color:#8b4b16;
  font-size:12px;
  line-height:1.7;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>TOTONOI+ ギフトカード管理</h1>

  <label>シリアル番号</label>
  <input id="serial" placeholder="例：TG-0001">
  <button onclick="searchCard()">検索</button>

  <div id="result"></div>

  <p class="note">※ スタッフはスプレッドシートを直接編集せず、この画面から確認・使用処理します。</p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxrRcaJSBI8QN1KWBogbD0MK222FtVBDvlmSnRN2nsEaSwrOyv7xqxtosK_Yk6nHnx8/exec";
let currentCard = null;

function api(params){
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.floor(Math.random() * 10000);

    params.callback = callbackName;

    window[callbackName] = function(data){
      delete window[callbackName];
      script.remove();
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = GAS_URL + '?' + new URLSearchParams(params).toString();
    script.onerror = function(){
      delete window[callbackName];
      script.remove();
      reject(new Error('GASとの通信に失敗しました'));
    };

    document.body.appendChild(script);
  });
}

async function searchCard(){
  const serial = document.getElementById('serial').value.trim();
  if(!serial) return alert('シリアル番号を入力してください');

  document.getElementById('result').innerHTML = '検索中...';

  const res = await api({ mode:'staff_search', serial });

  if(!res.ok){
    currentCard = null;
    document.getElementById('result').innerHTML = '<div class="error">' + (res.message || '見つかりませんでした') + '</div>';
    return;
  }

  currentCard = res.card;
  const used = ['利用済','利用済み','使用済'].includes(currentCard.status);

  document.getElementById('result').innerHTML = `
    <div class="card">
      <div class="status ${used ? 'used':'unused'}">${currentCard.status}</div>
      <div class="row">シリアル：${currentCard.serial}</div>
      <div class="row">金額：${currentCard.amount || '5,000円'}</div>
      <div class="row">発行日：${currentCard.issueDate || ''}</div>
      <div class="row">有効期限：${currentCard.expiryDate || ''}</div>
      <div class="row">電話番号：${currentCard.phone || ''}</div>

      ${used ? `
        <div class="row">使用日時：${currentCard.usedAt || ''}</div>
        <div class="row">対応スタッフ：${currentCard.usedStaff || ''}</div>
        <div class="row">メモ：${currentCard.memo || ''}</div>

        <div class="correctionPanel">
          <h2>利用済み処理の訂正</h2>

          <p>
            誤って利用済みにした場合のみ使用してください。
            訂正内容は削除できない操作履歴として保存されます。
          </p>

          <label>理由カテゴリ 必須</label>
          <select id="cancelReasonCategory" onchange="validateCorrectionForm()">
            <option value="">選択してください</option>
            <option value="操作ミス">操作ミス</option>
            <option value="シリアル入力ミス">シリアル入力ミス</option>
            <option value="お客様都合">お客様都合</option>
            <option value="システム障害">システム障害</option>
            <option value="その他">その他</option>
          </select>

          <label>訂正理由の詳細 必須</label>
          <textarea
            id="cancelReasonDetail"
            rows="4"
            minlength="20"
            placeholder="状況・原因・正しい処理内容を20文字以上で入力してください"
            oninput="updateReasonCount();validateCorrectionForm()"
          ></textarea>
          <div class="countHint" id="reasonCount">0 / 20文字以上</div>

          <label>操作担当者 必須</label>
          <select id="cancelOperator" onchange="validateCorrectionForm()">
            <option value="">選択してください</option>
            <option>土屋</option>
            <option>四ツ谷</option>
            <option>絹果</option>
            <option>ユ</option>
            <option>佐藤</option>
            <option>高田</option>
            <option>高橋</option>
          </select>

          <label>確認担当者 必須</label>
          <select id="cancelReviewer" onchange="validateCorrectionForm()">
            <option value="">別の社員を選択してください</option>
            <option>土屋</option>
            <option>四ツ谷</option>
            <option>絹果</option>
            <option>ユ</option>
            <option>佐藤</option>
            <option>高田</option>
            <option>高橋</option>
          </select>

          <label class="checkRow">
            <input
              id="cancelContentConfirmed"
              type="checkbox"
              onchange="validateCorrectionForm()"
            >
            <span>
              操作担当者と確認担当者の2名で、
              シリアル番号・訂正理由・現在の状態を確認しました。
            </span>
          </label>

          <label class="checkRow">
            <input
              id="cancelAuditConfirmed"
              type="checkbox"
              onchange="validateCorrectionForm()"
            >
            <span>
              この訂正が操作履歴へ永久保存されることを理解しました。
            </span>
          </label>

          <button
            class="correctionButton"
            id="cancelUseButton"
            onclick="cancelCardUseV2()"
            disabled
          >
            利用済みを訂正（未使用へ戻す）
          </button>

          <div class="auditNotice">
            ※ 操作担当者と確認担当者に同じ社員は指定できません。
          </div>
        </div>
      ` : `
        <label>対応スタッフ</label>
        <select id="staff">
          <option value="">選択してください</option>
          <option>土屋</option>
          <option>四ツ谷</option>
          <option>絹果</option>
          <option>ユ</option>
          <option>佐藤</option>
          <option>高田</option>
          <option>高橋</option>
        </select>

        <label>メモ</label>
        <textarea id="memo" rows="3" placeholder="例：来店時に使用"></textarea>

        <button class="use" onclick="useCard()">このギフトカードを使用済みにする</button>
      `}
    </div>
  `;
}

async function useCard(){
  if(!currentCard) return alert('カード情報がありません');

  const staff = document.getElementById('staff').value;
  const memo = document.getElementById('memo').value.trim();

  if(!staff) return alert('対応スタッフを選択してください');
  if(!confirm('このギフトカードを使用済みにします。よろしいですか？')) return;

  const result = document.getElementById('result');
  result.insertAdjacentHTML('beforeend', '<p id="processing" style="font-weight:bold;color:#8a5a44;">使用処理中です...</p>');

  try {
    const res = await api({
      mode:'staff_use',
      serial:currentCard.serial,
      staff,
      memo
    });

    const processing = document.getElementById('processing');
    if(processing) processing.remove();

    if(!res.ok){
      alert(res.message || '更新できませんでした');
      result.insertAdjacentHTML('beforeend', '<p style="color:#b00020;font-weight:bold;">更新失敗：' + (res.message || '原因不明') + '</p>');
      return;
    }

    alert(res.message || '使用済みにしました');
    await searchCard();

  } catch(err) {
    const processing = document.getElementById('processing');
    if(processing) processing.remove();

    alert('通信エラー：' + err.message);
    result.insertAdjacentHTML('beforeend', '<p style="color:#b00020;font-weight:bold;">通信エラー：' + err.message + '</p>');
  }
}

function updateReasonCount(){
  const input = document.getElementById('cancelReasonDetail');
  const count = document.getElementById('reasonCount');

  if(!input || !count) return;

  count.textContent =
    input.value.trim().length +
    ' / 20文字以上';
}

function validateCorrectionForm(){
  const category = document.getElementById('cancelReasonCategory');
  const detail = document.getElementById('cancelReasonDetail');
  const operator = document.getElementById('cancelOperator');
  const reviewer = document.getElementById('cancelReviewer');
  const contentConfirmed = document.getElementById('cancelContentConfirmed');
  const auditConfirmed = document.getElementById('cancelAuditConfirmed');
  const button = document.getElementById('cancelUseButton');

  if(
    !category ||
    !detail ||
    !operator ||
    !reviewer ||
    !contentConfirmed ||
    !auditConfirmed ||
    !button
  ){
    return;
  }

  const valid =
    category.value !== '' &&
    detail.value.trim().length >= 20 &&
    operator.value !== '' &&
    reviewer.value !== '' &&
    operator.value !== reviewer.value &&
    contentConfirmed.checked &&
    auditConfirmed.checked;

  button.disabled = !valid;
}

async function cancelCardUseV2(){
  if(!currentCard){
    alert('カード情報がありません');
    return;
  }

  const reasonCategory =
    document.getElementById('cancelReasonCategory').value;

  const reasonDetail =
    document.getElementById('cancelReasonDetail').value.trim();

  const operator =
    document.getElementById('cancelOperator').value;

  const reviewer =
    document.getElementById('cancelReviewer').value;

  const contentConfirmed =
    document.getElementById('cancelContentConfirmed').checked;

  const auditConfirmed =
    document.getElementById('cancelAuditConfirmed').checked;

  if(!reasonCategory){
    alert('理由カテゴリを選択してください');
    return;
  }

  if(reasonDetail.length < 20){
    alert('訂正理由の詳細を20文字以上で入力してください');
    return;
  }

  if(!operator || !reviewer){
    alert('操作担当者と確認担当者を選択してください');
    return;
  }

  if(operator === reviewer){
    alert('確認担当者は別の社員を選択してください');
    return;
  }

  if(!contentConfirmed || !auditConfirmed){
    alert('2つの確認項目にチェックしてください');
    return;
  }

  const confirmed = confirm(
    currentCard.serial +
    ' を「利用済」から「未使用」へ戻します。\n\n' +
    '操作担当：' + operator + '\n' +
    '確認担当：' + reviewer + '\n' +
    '理由：' + reasonCategory + '\n\n' +
    'この操作は操作履歴へ永久保存されます。'
  );

  if(!confirmed) return;

  const finalWord = prompt(
    '最終確認として「訂正」と入力してください'
  );

  if(finalWord !== '訂正'){
    alert('訂正処理を中止しました');
    return;
  }

  const button = document.getElementById('cancelUseButton');
  button.disabled = true;
  button.textContent = '訂正処理中...';

  try{
    const res = await api({
      mode:'staff_cancel_use_v2',
      serial:currentCard.serial,
      reasonCategory,
      reasonDetail,
      operator,
      reviewer,
      contentConfirmed:'true',
      auditConfirmed:'true'
    });

    if(!res.ok){
      alert(res.message || '訂正できませんでした');
      button.textContent = '利用済みを訂正（未使用へ戻す）';
      validateCorrectionForm();
      return;
    }

    alert(
      (res.message || '未使用へ戻しました') +
      '\n\n履歴ID：' +
      (res.historyId || '記録済み')
    );

    await searchCard();

  }catch(error){
    alert('通信エラー：' + error.message);
    button.textContent = '利用済みを訂正（未使用へ戻す）';
    validateCorrectionForm();
  }
}

</script>
</body>
</html>
